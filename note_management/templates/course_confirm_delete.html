{% extends "base.html" %}
{% block content %}

<div class="delete-box">
    <h2>Delete Course</h2>
    <p>
        Are you sure you want to delete "{{ course.title }}" ?
    </p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit">
            Delete
        </button>
    </form>
</div>
{% endblock %}
