{% extends "base.html" %}
{% block content %}

<h2>Course Notes</h2>

<form class="search-form" method="GET">
    <input 
        type="text"
        name="q"
        value="{{ query }}"
        placeholder="Search notes..." 
        >

    <button type="submit">
        Search
    </button>
</form>

<div class="note-list">
    {% for note in notes %}
    <div class="note-card">
        {{ note.title }}
    </div>
    {% empty %} 
    <p>Note not found.</p>
    {% endfor %}
</div>
