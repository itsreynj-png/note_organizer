{% extends "base.html" %}
{% block content %}

<h2>My Courses</h2>

<div class="course-list">

    {% for course in courses %}
    <div class="course-card">
        <a href="{% url "course_detail" course.id %}">
            <h3>{{ course.title }}</h3>
        </a>
        <p>{{ course.description }}</p>
    </div>

    {% empty %}
    <p>No courses yet.</p>
    {% endfor %}

</div>

<a href="{% url "course_create" %}">
    <button class="action-btn">
        Create Course
    </button>
</a>

{% endblock %}
