{% extends 'base.html' %}
{% block content %}

<h2>Login</h2>

<form method="POST" class="login-form">
    {% csrf_token %}

    <p>Username</p> 
    <input type="text" name="username">

    <p>Password</p>
    <input type="password" name="password">

    <button type="submit">Login</button>
</form>

<p class="register_text">
    Don't have an account?
    <a href="{% url "register" %}">Register</a>
</p>
{% if error %}
<p>{{ error }}</p>
{% endif %}

{% endblock  %}
