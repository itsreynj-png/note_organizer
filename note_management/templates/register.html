{% extends 'base.html' %}
{% block content %}

<h2>Register</h2>

<form class="register-form">

    <p>Username</p>
    <input type="text">

    <p>Email</p>
    <input type="email">

    <p>Password</p>
    <input type="password">

    <p>Confirm Password</p>
    <input type="password">

    <button>Register</button>
</form>

<p class="login_text">
    Already have an account?
    <a href="#">Login</a>
</p>
{% endblock %}
