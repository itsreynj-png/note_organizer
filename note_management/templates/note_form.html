{% extends "base.html" %}
{% block content %}

<h2>Edit Note</h2>

<form method="POST" class="note-form">
    {% csrf_token %}

    <p>Title</p>
    {{ form.title }}

    <p>Content</p>
    {{ form.content }}

    <p>Course</p>
    {{ form.course }}

    <button type="submit" class="action-btn">
        Save
    </button>

</form>
{% endblock %}
