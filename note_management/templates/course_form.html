{% extends "base.html" %}
{% block content %}

<h2>Course form</h2>

<form method="POST" class="course-form">
    {% csrf_token %}

    <p>Title</p>
    {{ form.title }}

    <p>Description</p>
    {{ form.description }}

    <button type="submit" class="action-btn">
        Save
    </button>

</form>

{% endblock %}
