{% extends "base.html" %}
{% block content %}

<h2>Edit Note</h2>

<form method="POST" enctype="multipart/form-data" class="note-form">
    {% csrf_token %}

    <p>Title</p>
    {{ form.title }}

    <p>Content</p>
    {{ form.content }}

    <p>Upload File</p>
    {{ form.file }}

    <button type="submit" class="action-btn">
        Save
    </button>

</form>
{% endblock %}
